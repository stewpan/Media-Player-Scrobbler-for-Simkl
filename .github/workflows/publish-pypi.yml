name: Publish to PyPI

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: true
    secrets:
      SIMKL_CLIENT_ID:
        required: true
      SIMKL_CLIENT_SECRET:
        required: true
      PYPI_API_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build/publish (e.g., 2.3.1)'
        required: true
        type: string
      publish:
        description: 'PyPI publish'
        required: true
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  
      contents: write  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry --version
          poetry lock

      - name: Validate project metadata
        run: poetry check


      - name: Set version in pyproject.toml
        run: poetry version ${{ inputs.version }}

      
      - name: Inject Simkl Credentials into Code
        env:
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
          SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}
        run: |
          # Check if secrets are available
          if [ -z "$SIMKL_CLIENT_ID" ]; then
            echo "::error::SIMKL_CLIENT_ID secret is not set."
            exit 1
          fi
          if [ -z "$SIMKL_CLIENT_SECRET" ]; then
            echo "::error::SIMKL_CLIENT_SECRET secret is not set."
            exit 1
          fi

          # Inject Client ID and Secret into assignment lines
          echo "Injecting SIMKL_CLIENT_ID into credentials.py"
          sed -i "s|^SIMKL_CLIENT_ID = .*|SIMKL_CLIENT_ID = \"${SIMKL_CLIENT_ID}\"|" simkl_mps/credentials.py

          echo "Injecting SIMKL_CLIENT_SECRET into credentials.py"
          sed -i "s|^SIMKL_CLIENT_SECRET = .*|SIMKL_CLIENT_SECRET = \"${SIMKL_CLIENT_SECRET}\"|" simkl_mps/credentials.py

          echo "✅ Credentials successfully injected into simkl_mps/credentials.py"

      - name: Build package
        run: |
          poetry build
          ls -la dist/
        env:
          VERSION: ${{ inputs.version }}

      # - name: Upload Python package artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: python-package
      #     path: dist/
      #     retention-days: 1

      - name: Publish to PyPI (skip existing)
        if: ${{ inputs.publish }}
        run: poetry publish --skip-existing -vvv
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
