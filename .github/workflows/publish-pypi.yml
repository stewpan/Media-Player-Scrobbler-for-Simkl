name: Publish to PyPI

on:
  push:
    branches:
      - release/2.3.2-combined
    paths:
      - '.github/workflows/publish-pypi.yml'
      - 'pyproject.toml'
      - 'simkl_mps/**'
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: true
    secrets:
      SIMKL_CLIENT_ID:
        required: true
      SIMKL_CLIENT_SECRET:
        required: true
      PYPI_API_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build/publish (e.g., 2.3.1)'
        required: true
        type: string
      publish:
        description: 'If false, only build and upload artifacts (no PyPI publish)'
        required: true
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  
      contents: write  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry --version
          poetry lock

      - name: Validate project metadata
        run: poetry check


      - name: Set version in pyproject.toml
        if: ${{ github.event_name != 'push' }}
        run: poetry version ${{ inputs.version }}

      - name: Branch publish mode info
        if: ${{ github.event_name == 'push' }}
        run: |
          echo "Push trigger on release/2.3.2-combined detected. Using version from repository files."

      
      - name: Inject Simkl Credentials into Code
        env:
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
          SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}
        run: |
          # Check if secrets are available
          if [ -z "$SIMKL_CLIENT_ID" ]; then
            echo "::error::SIMKL_CLIENT_ID secret is not set."
            exit 1
          fi
          if [ -z "$SIMKL_CLIENT_SECRET" ]; then
            echo "::error::SIMKL_CLIENT_SECRET secret is not set."
            exit 1
          fi

            # Inject only runtime assignment lines as valid Python string literals.
            # Keep placeholder constants unchanged so placeholder detection remains correct.
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import re

          path = Path("simkl_mps/credentials.py")
          text = path.read_text(encoding="utf-8")

          id_literal = json.dumps(os.environ["SIMKL_CLIENT_ID"])
          secret_literal = json.dumps(os.environ["SIMKL_CLIENT_SECRET"])

          text, id_count = re.subn(
            r'^SIMKL_CLIENT_ID\s*=\s*.*$',
            f'SIMKL_CLIENT_ID = {id_literal}',
            text,
            count=1,
            flags=re.MULTILINE,
          )
          text, secret_count = re.subn(
            r'^SIMKL_CLIENT_SECRET\s*=\s*.*$',
            f'SIMKL_CLIENT_SECRET = {secret_literal}',
            text,
            count=1,
            flags=re.MULTILINE,
          )

          if id_count != 1 or secret_count != 1:
            raise RuntimeError("Failed to inject SIMKL credentials into runtime assignment lines")
      - name: Verify credential placeholders are gone
        run: |
          if grep -qE '^SIMKL_CLIENT_ID\s*=\s*CLIENT_ID_PLACEHOLDER$|^SIMKL_CLIENT_SECRET\s*=\s*CLIENT_SECRET_PLACEHOLDER$' simkl_mps/credentials.py; then
            echo "::error::Runtime credential assignment still points to placeholders"
            exit 1
          fi
          echo "✅ Runtime credential assignments injected successfully"

      - name: Build package
        run: |
          poetry build
          ls -la dist/
        env:
          VERSION: ${{ inputs.version }}

      # - name: Upload Python package artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: python-package
      #     path: dist/
      #     retention-days: 1

      - name: Publish to PyPI (skip existing)
        if: ${{ github.event_name == 'push' || inputs.publish }}
        run: poetry publish --skip-existing -vvv
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
