name: Publish to PyPI

on:
  push:
    branches:
      - release/2.3.2-combined
    paths:
      - '.github/workflows/publish-pypi.yml'
      - 'pyproject.toml'
      - 'simkl_mps/**'
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: true
    secrets:
      SIMKL_CLIENT_ID:
        required: true
      SIMKL_CLIENT_SECRET:
        required: true
      PYPI_API_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build/publish (e.g., 2.3.1)'
        required: true
        type: string
      publish:
        description: 'If false, only build and upload artifacts (no PyPI publish)'
        required: true
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  
      contents: write  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry --version
          poetry lock

      - name: Validate project metadata
        run: poetry check


      - name: Set version in pyproject.toml
        if: ${{ github.event_name != 'push' }}
        run: poetry version ${{ inputs.version }}

      - name: Branch publish mode info
        if: ${{ github.event_name == 'push' }}
        run: |
          echo "Push trigger on release/2.3.2-combined detected. Using version from repository files."

      
      - name: Inject Simkl Credentials into Code
        env:
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
          SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}
        run: |
          # Check if secrets are available
          if [ -z "$SIMKL_CLIENT_ID" ]; then
            echo "::error::SIMKL_CLIENT_ID secret is not set."
            exit 1
          fi
          if [ -z "$SIMKL_CLIENT_SECRET" ]; then
            echo "::error::SIMKL_CLIENT_SECRET secret is not set."
            exit 1
          fi

          # Inject Client ID
          echo "Injecting SIMKL_CLIENT_ID into credentials.py"
          # Use a different delimiter for sed in case the secret contains slashes
          sed -i "s|SIMKL_CLIENT_ID_PLACEHOLDER|${SIMKL_CLIENT_ID}|g" simkl_mps/credentials.py

          # Inject Client Secret
          echo "Injecting SIMKL_CLIENT_SECRET into credentials.py"
          sed -i "s|SIMKL_CLIENT_SECRET_PLACEHOLDER|${SIMKL_CLIENT_SECRET}|g" simkl_mps/credentials.py

          echo "✅ Credentials successfully injected into simkl_mps/credentials.py"

      - name: Build package
        run: |
          poetry build
          ls -la dist/
        env:
          VERSION: ${{ inputs.version }}

      # - name: Upload Python package artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: python-package
      #     path: dist/
      #     retention-days: 1

      - name: Publish to PyPI (skip existing)
        if: ${{ github.event_name == 'push' || inputs.publish }}
        run: poetry publish --skip-existing -vvv
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
